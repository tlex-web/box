[package]
name = "box"
version = "0.1.0"
edition = "2021"
description = "A Rust CLI toolbox — 23 command-line tools in one binary"

[[bin]]
name = "box"
path = "src/main.rs"

[dependencies]
# CLI
clap = { version = "4.6", features = ["derive"] }
anyhow = "1.0"
thiserror = "2.0"
# Terminal
# `supports-colors` exposes the global `set_override`/`with_override` API used by
# core::output::init_color to gate color once at startup (D-10).
owo-colors = { version = "4.3", features = ["supports-colors"] }
enable-ansi-support = "0.3"
crossterm = "0.29"
# Directory walking
walkdir = "2.5"
# Path normalization (no \\?\ UNC leak)
dunce = "1.0"
# Phase-2 pure-transform crates (added once here so Wave-2 command plans never
# touch the manifest — D-01 lean bundle):
# `v4` auto-enables rng+std+getrandom; Display gives RFC-4122 lowercase-hyphenated.
uuid = { version = "1.23.3", features = ["v4"] }
# STANDARD + URL_SAFE_NO_PAD engines; zero transitive deps.
base64 = "0.22.1"
# default-features off trims oldtime/wasmbind; `clock` keeps `Local` (pulls
# iana-time-zone transitively); `std` for the rest of the API (D-01).
chrono = { version = "0.4.45", default-features = false, features = ["clock", "std"] }
# OsRng for passgen (CSPRNG) + rng() for the whimsy commands (D-08).
rand = "0.9"
blake3 = "1.8.5"
md-5 = "0.11.0"
rayon = "1.12.0"
sha2 = "0.11.0"
regex = "1.12.4"
base16ct = "1.0.0"
const-hex = "1.19.1"
# NOTE: no `rand_core` yet — verify `use rand::TryRngCore` resolves through rand
# 0.9 re-exports during the passgen plan (RESEARCH A1); not needed here.
# NOTE: no `filetime` — use std::fs::FileTimes (Rust 1.75+).
# NOTE: no `is-terminal` — use std::io::IsTerminal (Rust 1.70+).

[dev-dependencies]
assert_cmd = "2.2"
predicates = "3.1"
assert_fs = "1.1"
tempfile = "3.27"
trycmd = "1.2"
insta = "1.48"

[profile.release]
lto = "thin"
codegen-units = 1
strip = "symbols"
panic = "abort"
opt-level = 3
